<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン - Amazon 価格追跡</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-area .icon { font-size: 48px; margin-bottom: 8px; }
    .logo-area h1 {
      font-size: 22px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .logo-area .amazon { color: #ff9900; }
    .logo-area p { font-size: 13px; color: #6b7280; }

    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      outline: none;
      transition: border .2s, box-shadow .2s;
      background: #fafafa;
    }
    input:focus {
      border-color: #ff9900;
      box-shadow: 0 0 0 3px rgba(255,153,0,.15);
      background: #fff;
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #ff9900, #e68a00);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .1s;
    }
    .login-btn:hover { opacity: .92; }
    .login-btn:active { transform: scale(.98); }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }

    .error-msg {
      background: #ffebee;
      color: #e53935;
      border: 1px solid #ffcdd2;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }
    .error-msg.show { display: block; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo-area">
    <div class="icon">📦</div>
    <h1><span class="amazon">Amazon</span> 価格追跡</h1>
    <p>ログインして価格追跡を始めましょう</p>
  </div>

  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="form-group">
      <label for="username">ユーザー名</label>
      <input type="text" id="username" placeholder="ユーザー名を入力" autocomplete="username" required />
    </div>
    <div class="form-group">
      <label for="password">パスワード</label>
      <input type="password" id="password" placeholder="パスワードを入力" autocomplete="current-password" required />
    </div>
    <button type="submit" class="login-btn" id="loginBtn">ログイン</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById("loginBtn");
  const err = document.getElementById("errorMsg");
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  err.className = "error-msg";
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> ログイン中…';

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
      credentials: "include",
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = "/";
    } else {
      err.textContent = data.error || "ログインに失敗しました";
      err.className = "error-msg show";
      btn.disabled = false;
      btn.textContent = "ログイン";
    }
  } catch {
    err.textContent = "サーバーに接続できません";
    err.className = "error-msg show";
    btn.disabled = false;
    btn.textContent = "ログイン";
  }
}
</script>
</body>
</html>
